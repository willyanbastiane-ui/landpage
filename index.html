<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Landing Page</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; line-height: 1.6; transition: 0.4s; }
        header { background: #4a90e2; color: white; padding: 60px 20px; transition: 0.4s; }
        .container { padding: 40px 20px; }
        
        /* Estilo dos Controles */
        .controls { padding: 20px; display: flex; justify-content: center; gap: 15px; background: #f4f4f4; transition: 0.4s; }
        button, select { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; cursor: pointer; background: white; transition: 0.3s; }
        button:hover { background: #ddd; }

        .btn { background: #ff5722; color: white; padding: 15px 30px; text-decoration: none; border-radius: 30px; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #e64a19; transform: scale(1.05); }

        /* Modo Escuro */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode .controls { background: #1f1f1f; }
        body.dark-mode header { background: #2c3e50; }
        body.dark-mode button, body.dark-mode select { background: #333; color: white; border-color: #555; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="toggleDarkMode()">🌓 Modo Escuro</button>
        <select onchange="changeLanguage(this.value)">
            <option value="pt">🇧🇷 Português</option>
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
        </select>
    </div>

    <header id="header">
        <h1 id="title">Bem-vindo ao meu projeto incrível</h1>
        <p id="subtitle">A solução que você estava procurando para simplificar sua vida.</p>
    </header>

    <section class="container">
        <h2 id="section-title">O que oferecemos?</h2>
        <p id="section-text">Aqui você pode descrever os benefícios do seu produto ou serviço.</p>
        <a href="#" class="btn" id="btn-text">Quero saber mais</a>
    </section>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        const translations = {
            en: { title: "Welcome to my amazing project", subtitle: "The solution you were looking for.", secTitle: "What we offer?", secText: "Describe your benefits here.", btn: "Learn more" },
            es: { title: "Bienvenido a mi proyecto increíble", subtitle: "La solución que estabas buscando.", secTitle: "¿Qué ofrecemos?", secText: "Describe tus beneficios aquí.", btn: "Saber más" },
            pt: { title: "Bem-vindo ao meu projeto incrível", subtitle: "A solução que você estava procurando.", secTitle: "O que oferecemos?", secText: "Aqui você pode descrever os benefícios.", btn: "Quero saber mais" }
        };

        function changeLanguage(lang) {
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('subtitle').innerText = translations[lang].subtitle;
            document.getElementById('section-title').innerText = translations[lang].secTitle;
            document.getElementById('section-text').innerText = translations[lang].secText;
            document.getElementById('btn-text').innerText = translations[lang].btn;
        }
    </script>
</body>
</html>
